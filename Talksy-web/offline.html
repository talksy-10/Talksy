<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talksy Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #d9ecdd 0%, #e8f4ea 55%, #d2e7d6 100%);
        color: #1d3826;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 32rem);
        padding: 2rem;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 60px rgba(41, 88, 57, 0.14);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 6vw, 3rem);
      }

      p {
        margin: 0.6rem 0;
        line-height: 1.6;
        color: #4f6f58;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Talksy is offline</h1>
      <p>The app was opened without internet right now.</p>
      <p>If you already loaded Talksy before, go back and refresh once. The main app should work offline after it gets cached.</p>
    </main>
  </body>
</html>
